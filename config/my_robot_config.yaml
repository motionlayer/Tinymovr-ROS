controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

joint_state_broadcaster:
  ros__parameters: {}

diff_drive_controller:
  ros__parameters:
    # ROS 2 uses arrays for wheel names (changed from ROS 1)
    left_wheel_names: ["wheel_1"]
    right_wheel_names: ["wheel_2"]

    # Physical parameters (from your old config)
    wheel_separation: 0.4
    wheel_radius: 0.12

    # Fine-tuning multipliers (keep at 1.0 unless you need to adjust)
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    # Publishing and frames
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link

    # Covariance (from your old config)
    pose_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 1000.0]
    twist_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 1000.0]

    # Control parameters
    open_loop: false
    enable_odom_tf: true
    cmd_vel_timeout: 0.5
    use_stamped_vel: false
    velocity_rolling_window_size: 10
    position_feedback: false

    # Velocity limits (SAFETY)
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 0.5  # m/s - adjust based on your robot
        min_velocity: -0.5
        has_acceleration_limits: true
        max_acceleration: 1.0  # m/s^2
        min_acceleration: -1.0
    angular:
      z:
        has_velocity_limits: true
        max_velocity: 1.0  # rad/s - adjust based on your robot
        has_acceleration_limits: true
        max_acceleration: 2.0  # rad/s^2
